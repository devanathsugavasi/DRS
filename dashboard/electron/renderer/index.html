<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cricket DRS broadcast dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="top-bar">
        <div class="brand">
          <strong>Cricket DRS dashboard</strong>
          <span id="engine-state">Engine starting</span>
        </div>
        <div class="live-indicator"><i></i><span>Live</span></div>
        <div id="camera-pills" class="camera-pills"></div>
        <button id="settings-button" type="button">Settings</button>
      </header>

      <section class="stage">
        <section class="left-column">
          <div class="camera-grid">
            <article class="camera-panel" id="camera-panel-1">
              <img id="camera-1" alt="Camera 1 feed" />
              <div class="camera-label">Camera 1</div>
              <div class="camera-fps" id="camera-1-fps">-- fps</div>
            </article>
            <article class="camera-panel" id="camera-panel-2">
              <img id="camera-2" alt="Camera 2 feed" />
              <div class="camera-label">Camera 2</div>
              <div class="camera-fps" id="camera-2-fps">-- fps</div>
            </article>
          </div>

          <article class="trajectory-panel">
            <header>
              <span>Ball trajectory</span>
              <strong id="trajectory-status">Waiting</strong>
            </header>
            <canvas id="trajectory-canvas" width="500" height="200"></canvas>
          </article>
        </section>

        <aside class="decision-column">
          <section class="decision-card">
            <span id="decision-badge" class="badge waiting">Waiting</span>
            <h1 id="decision-title">Waiting for appeal</h1>
            <dl>
              <div><dt>Ball confidence</dt><dd id="ball-confidence">--</dd></div>
              <div><dt>Impact location</dt><dd id="impact-location">--</dd></div>
              <div><dt>Wicket zone</dt><dd id="wicket-zone">--</dd></div>
              <div><dt>Ball speed</dt><dd id="ball-speed">--</dd></div>
            </dl>
          </section>

          <section class="appeal-card">
            <button id="request-review" type="button">Request review</button>
            <button id="confirm-out" type="button">Confirm OUT</button>
            <button id="confirm-not-out" type="button">Confirm NOT OUT</button>
          </section>

          <section class="system-card">
            <h2>System</h2>
            <pre id="system-log">Dashboard loaded.</pre>
          </section>
        </aside>
      </section>
    </main>
    <script src="renderer.js"></script>
  </body>
</html>
