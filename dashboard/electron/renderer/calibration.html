<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DRS pitch calibration</title>
    <link rel="stylesheet" href="calibration.css" />
  </head>
  <body>
    <main class="calibration-shell">
      <header class="calibration-top">
        <div>
          <strong>Pitch calibration</strong>
          <p>Mark stumps and creases once per camera. ICC standard dimensions assumed.</p>
        </div>
        <div class="top-actions">
          <button id="back-dashboard" type="button">Back to dashboard</button>
        </div>
      </header>

      <section class="calibration-workspace">
        <aside class="marker-panel">
          <h2>Camera</h2>
          <div class="camera-select">
            <button type="button" class="camera-btn active" data-camera="1">Camera 1</button>
            <button type="button" class="camera-btn" data-camera="2">Camera 2</button>
          </div>

          <h2>Markers</h2>
          <p class="hint">Select a marker, then click the matching feature on the image.</p>
          <div id="marker-list" class="marker-list"></div>

          <div class="panel-actions">
            <button id="capture-frame" type="button">Capture frame</button>
            <label class="upload-label">
              Upload snapshot
              <input id="upload-snapshot" type="file" accept="image/*" hidden />
            </label>
            <button id="undo-marker" type="button">Undo last</button>
            <button id="clear-markers" type="button">Clear all</button>
            <button id="save-calibration" type="button" class="primary">Save calibration</button>
          </div>

          <div id="save-status" class="save-status">Not saved yet</div>
        </aside>

        <section class="canvas-panel">
          <div class="canvas-toolbar">
            <span id="active-marker-label">Active: off stump</span>
            <span id="marker-progress">0 / 5 marked</span>
          </div>
          <div id="canvas-wrap" class="canvas-wrap">
            <img id="calibration-image" alt="Calibration frame" hidden />
            <canvas id="marker-canvas"></canvas>
            <div id="canvas-empty" class="canvas-empty">Capture or upload a frame to begin marking</div>
          </div>
        </section>

        <aside class="reference-panel">
          <h2>ICC reference</h2>
          <dl id="icc-dimensions"></dl>
          <h2>Saved profiles</h2>
          <ul id="saved-profiles" class="saved-profiles"></ul>
        </aside>
      </section>
    </main>
    <script src="calibration.js"></script>
  </body>
</html>
